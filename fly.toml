# Alternativa en Fly.io: fly launch (ajusta app) y fly volumes create recetario_data -r mad
app = "recetario"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  RECETARIO_DATA_DIR = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"

[mounts]
  source = "recetario_data"
  destination = "/data"
